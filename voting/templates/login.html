{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VoteSphere Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(
                135deg,
                #0f172a,
                #1e293b,
                #334155
            );
        }

        .login-box{

            width:420px;

            background:white;

            padding:40px;

            border-radius:20px;

            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        .logo{

            text-align:center;

            margin-bottom:20px;
        }

        .logo img{

            width:240px;
            height:auto;
        }

        .title{

            text-align:center;

            font-size:28px;

            font-weight:bold;

            color:#111827;

            margin-bottom:10px;
        }

        .subtitle{

            text-align:center;

            color:#6b7280;

            margin-bottom:25px;
        }

        .input-box{

            position:relative;

            margin-bottom:18px;
        }

        .input-box input{

            width:100%;

            padding:14px;

            border:1px solid #d1d5db;

            border-radius:10px;

            font-size:16px;

            outline:none;
        }

        .input-box input:focus{

            border-color:#2563eb;
        }

        .toggle-password{

            position:absolute;

            right:15px;

            top:50%;

            transform:translateY(-50%);

            cursor:pointer;
        }

        .error{

            color:red;

            text-align:center;

            margin-bottom:15px;
        }

        button{

            width:100%;

            padding:14px;

            border:none;

            border-radius:10px;

            background:#2563eb;

            color:white;

            font-size:18px;

            cursor:pointer;
        }

        button:hover{

            background:#1d4ed8;
        }

    </style>

</head>

<body>

<div class="login-box">

    <div class="logo">

        <img
            src="{% static 'images/votesphere_logo.png' %}"
            alt="votesphere_logo"
        >

    </div>

   

    <div class="subtitle">
        <h3><I>Secure Digital Election Platform</I></h3>
    </div>

    {% if error %}

    <p class="error">
        {{ error }}
    </p>

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="input-box">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

        </div>

        <div class="input-box">

            <input
                type="text"
                name="usn"
                placeholder="College USN"
            >

        </div>

        <div class="input-box">

            <input
                type="password"
                name="password"
                id="password"
                placeholder="Password"
                required
            >

            <span
                class="toggle-password"
                onclick="togglePassword()"
            >
                👁️
            </span>

        </div>

        <button type="submit">
            Login
        </button>

    </form>

</div>

<script>

function togglePassword(){

    var password =
        document.getElementById("password");

    if(password.type === "password"){

        password.type = "text";

    }else{

        password.type = "password";
    }
}

</script>

</body>
</html>
