{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h2>Voter Registration</h2>

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    <input type="text"
           name="username"
           placeholder="Username"
           required>

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <br><br>

    <input type="text"
           name="usn"
           placeholder="USN"
           required>

    <br><br>

    <input type="file"
           name="photo"
           accept="image/*"
           required>

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

</body>
</html>
